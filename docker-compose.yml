# =============================================================================
# Docker Compose for Worksy ERP Frontend
# =============================================================================
services:
  # =============================================================================
  # Production Service
  # =============================================================================
  worksy-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        # Build-time arguments (passed during docker build)
        VITE_API_URL: ${VITE_API_URL:-http://worksy-backend:15320/api}
        VITE_GEOAPIFY_API_KEY: ${VITE_GEOAPIFY_API_KEY:-}
    container_name: worksy-frontend-prod
    image: worksy-frontend:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    networks:
      - worksy-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Runtime environment variables (if needed)
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "app.name=worksy-erp"
      - "app.component=frontend"
      - "app.environment=production"

# =============================================================================
# Networks
# =============================================================================
networks:
  worksy-network:
    driver: bridge
    name: worksy_worksy-network
    external: true

