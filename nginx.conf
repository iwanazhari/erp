# =============================================================================
# Nginx Configuration for Worksy ERP Frontend (SPA)
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Document root
    root /usr/share/nginx/html;
    index index.html;

    # =============================================================================
    # Gzip Compression
    # =============================================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # =============================================================================
    # Security Headers
    # =============================================================================
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (adjust as needed for your app)
    # Note: This is a basic CSP. Adjust based on your app's requirements.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: http://localhost:*;" always;

    # =============================================================================
    # Cache Control for Static Assets
    # =============================================================================
    # Cache static assets (JS, CSS, images) for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache HTML files for shorter period
    location ~* \.(html|htm)$ {
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    # =============================================================================
    # SPA Routing - Redirect all requests to index.html
    # =============================================================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # Prevent caching of index.html to ensure users get latest version
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # =============================================================================
    # Health Check Endpoint
    # =============================================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # =============================================================================
    # API Proxy - Proxy API requests to backend container
    # =============================================================================
    # This allows the frontend to call /api and nginx will forward to backend
    # This avoids CORS issues and keeps API URL consistent
    
    location /api {
        # Backend container name and port (Docker network)
        proxy_pass http://worksy-backend:8080;
        
        # Required headers for proper proxying
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
        
        # Cache bypass for dynamic content
        proxy_cache_bypass $http_upgrade;
        
        # Buffer settings
        proxy_buffering off;
    }

    # =============================================================================
    # Error Pages (Optional - customize as needed)
    # =============================================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
